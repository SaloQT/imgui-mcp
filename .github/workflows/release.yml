name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libgl1-mesa-dev cmake g++ xvfb

      - name: Verify tag matches source version
        run: test "${GITHUB_REF_NAME}" = "v$(tr -d '[:space:]' < VERSION)"

      - name: Build, test, and package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ./release.sh "${VERSION}" --linux-only

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-x64
          path: dist/imgui-mcp-*-linux-x64.tar.gz

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Install MinGW + SDL2
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-mingw-w64-x86-64 cmake zip unzip wget

          # Download SDL2 MinGW dev libraries
          wget -q https://github.com/libsdl-org/SDL/releases/download/release-2.30.0/SDL2-devel-2.30.0-mingw.tar.gz
          echo "d44bd8cd869219f43634a898d7735d0c92d4b2cca129f709dc8b98402b36d5f3  SDL2-devel-2.30.0-mingw.tar.gz" | sha256sum -c -
          tar -xzf SDL2-devel-2.30.0-mingw.tar.gz
          mkdir -p cross
          cp -r SDL2-2.30.0/x86_64-w64-mingw32/* cross/

      - name: Verify tag matches source version
        run: test "${GITHUB_REF_NAME}" = "v$(tr -d '[:space:]' < VERSION)"

      - name: Build, test, and package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ./release.sh "${VERSION}" --windows-only

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-x64
          path: dist/imgui-mcp-*-windows-x64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: /tmp/artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            /tmp/artifacts/linux-x64/*.tar.gz
            /tmp/artifacts/windows-x64/*.zip
          body: |
            ## imgui-mcp ${{ github.ref_name }}

            AI agents design, control & debug Dear ImGui interfaces in real-time.

            ### Install

            **Linux:**
            ```bash
            tar -xzf imgui-mcp-*-linux-x64.tar.gz
            cd imgui-mcp-*-linux-x64
            ./setup.sh
            ```

            **Windows:**
            ```
            Extract zip → run install.bat
            ```

            ### What's included
            - 70+ MCP tools, 102 widget types
            - Visual feedback (screenshots)
            - Input simulation, animation, theming
            - Game UI patterns (health bars, inventory, dialogue, minimaps)
            - Export to C++, Lua, JSON
            - Works with Claude, Cursor, VS Code, omp, Windsurf, Zed, Gemini CLI & more
